name: expense_tracker
description: "CashWand - A lightweight personal finance tracker for students and young professionals."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Local Database (offline-first)
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # Charts & Visualization
  fl_chart: ^0.69.2

  # Navigation
  go_router: ^14.8.1

  # Date & Currency Formatting
  intl: ^0.19.0

  # Unique IDs for transactions
  uuid: ^4.5.1
  shared_preferences: ^2.5.4
  excel: ^4.0.6
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  local_auth: ^3.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
